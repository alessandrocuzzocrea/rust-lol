name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: sqlite:///home/runner/work/rust-lol/rust-lol/db.sqlite

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/sqlx
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features -F rustls,sqlite

      - name: Setup database
        run: |
          touch db.sqlite
          sqlx migrate run

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
